<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exam Countdown Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark: #111;
      --text-main: #f0f0f0;
      --text-muted: #888;
      --accent: #FFD700;
      --error: #ff6b6b;
      --setup-bg: #f5f5f5;
      --setup-card: #fff;
      --setup-text: #222;
      --setup-border: #ddd;
      --btn-bg: #2c5fcc;
      --btn-hover: #1e47a8;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--setup-bg);
      color: var(--setup-text);
      transition: background 0.4s, color 0.4s;
    }

    body.countdown-active {
      background: var(--bg-dark);
      color: var(--text-main);
    }

    /* ── Setup Screen ── */
    #setup-screen {
      background: var(--setup-card);
      border: 1px solid var(--setup-border);
      border-radius: 12px;
      padding: 2.5rem 3rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      text-align: center;
    }

    #setup-screen h1 {
      font-size: 1.5rem;
      margin-bottom: 0.4rem;
      color: var(--setup-text);
    }

    #setup-screen p {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 1.8rem;
    }

    .field-label {
      display: block;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 0.4rem;
    }

    #end-time {
      width: 100%;
      padding: 0.65rem 0.9rem;
      font-size: 1.1rem;
      border: 1px solid var(--setup-border);
      border-radius: 8px;
      color: var(--setup-text);
      background: #fafafa;
      margin-bottom: 1.4rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #end-time:focus { border-color: var(--btn-bg); }

    #start-btn {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      background: var(--btn-bg);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #start-btn:hover { background: var(--btn-hover); }

    #error-msg {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 0.8rem;
      min-height: 1.2em;
    }

    /* ── Countdown Screen ── */
    #countdown-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      width: 100%;
      height: 100%;
      padding: 2rem;
      position: relative;
    }

    #countdown-screen.visible { display: flex; }

    #countdown-number {
      font-size: clamp(100px, 22vw, 260px);
      font-weight: 800;
      line-height: 1;
      color: var(--text-main);
      letter-spacing: -0.02em;
      transition: color 0.5s;
    }

    #countdown-number.urgent { color: #ff6b6b; }
    #countdown-number.timesup {
      font-size: clamp(56px, 12vw, 140px);
      animation: pulse 1s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { opacity: 1; }
      to   { opacity: 0.5; }
    }

    #countdown-label {
      font-size: clamp(1rem, 3vw, 1.8rem);
      color: var(--text-muted);
      margin-top: 0.2em;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      min-height: 1.5em;
    }

    #milestone-msg {
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      color: var(--accent);
      margin-top: 1.2em;
      min-height: 2em;
      max-width: 700px;
      opacity: 0;
      transition: opacity 0.6s ease;
      font-style: italic;
    }

    #milestone-msg.visible { opacity: 1; }

    #current-time {
      font-size: clamp(0.9rem, 2vw, 1.3rem);
      color: var(--text-muted);
      margin-top: 1.8em;
      letter-spacing: 0.03em;
    }

    #reset-btn {
      position: absolute;
      bottom: 1.5rem;
      right: 1.5rem;
      background: transparent;
      border: 1px solid #444;
      color: #555;
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    #reset-btn:hover { color: #aaa; border-color: #777; }
  </style>
</head>
<body>

  <!-- Setup Screen -->
  <div id="setup-screen">
    <h1>Exam Timer</h1>
    <p>Set the exam end time and start the countdown.</p>
    <label class="field-label" for="end-time">Exam ends at</label>
    <input type="time" id="end-time" />
    <button id="start-btn">Start Timer</button>
    <div id="error-msg"></div>
  </div>

  <!-- Countdown Screen -->
  <div id="countdown-screen">
    <div id="countdown-number">--</div>
    <div id="countdown-label">minutes remaining</div>
    <div id="milestone-msg"></div>
    <div id="current-time"></div>
    <button id="reset-btn">&#8635; Reset</button>
  </div>

  <script>
    // ── Milestones (seconds remaining → message) ──────────────────────────
    const MILESTONES = [
      { at: 3600, msg: "One hour to go — get started strong." },
      { at: 2700, msg: "45 minutes remaining — stay focused." },
      { at: 1800, msg: "30 minutes left — you're doing great!" },
      { at:  900, msg: "15 minutes — keep pushing!" },
      { at:  600, msg: "10 minutes left — finish strong!" },
      { at:  300, msg: "5 minutes — wrap up your answers." },
      { at:  120, msg: "2 minutes — final review time!" },
      { at:   60, msg: "Last minute!" },
      { at:   30, msg: "30 seconds remaining." },
      { at:    0, msg: "Time's up! Pens down." },
    ];

    const MESSAGE_DURATION_MS = 60_000; // 1 minute

    // ── State ─────────────────────────────────────────────────────────────
    let endTime = null;
    let tickInterval = null;
    let shownMilestones = new Set();
    let messageTimeout = null;

    // ── DOM refs ──────────────────────────────────────────────────────────
    const setupScreen    = document.getElementById('setup-screen');
    const countdownScreen = document.getElementById('countdown-screen');
    const endTimeInput   = document.getElementById('end-time');
    const startBtn       = document.getElementById('start-btn');
    const errorMsg       = document.getElementById('error-msg');
    const countdownNum   = document.getElementById('countdown-number');
    const countdownLabel = document.getElementById('countdown-label');
    const milestoneMsg   = document.getElementById('milestone-msg');
    const currentTimeEl  = document.getElementById('current-time');
    const resetBtn       = document.getElementById('reset-btn');

    // ── Pre-fill time input with now + 1 hour ────────────────────────────
    (function prefill() {
      const d = new Date(Date.now() + 60 * 60 * 1000);
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      endTimeInput.value = `${hh}:${mm}`;

      // Restore last-used time if available
      const saved = localStorage.getItem('examEndTime');
      if (saved) endTimeInput.value = saved;
    })();

    // ── Start button ──────────────────────────────────────────────────────
    startBtn.addEventListener('click', () => {
      errorMsg.textContent = '';
      const val = endTimeInput.value;
      if (!val) { errorMsg.textContent = 'Please select an end time.'; return; }

      const [h, m] = val.split(':').map(Number);
      const candidate = new Date();
      candidate.setHours(h, m, 0, 0);

      const nowMs = Date.now();
      let diff = candidate - nowMs;

      // If in the past, assume they mean tomorrow
      if (diff <= 0) {
        candidate.setDate(candidate.getDate() + 1);
        diff = candidate - nowMs;
        const tomorrowStr = candidate.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        if (!confirm(`That time has passed today. Start a timer for ${tomorrowStr} tomorrow (${Math.round(diff/60000)} min from now)?`)) return;
      }

      // Warn if suspiciously far out (> 12 hours)
      if (diff > 12 * 60 * 60 * 1000) {
        const hrs = (diff / 3600000).toFixed(1);
        if (!confirm(`The timer is set for ${hrs} hours from now. Is that correct?`)) return;
      }

      localStorage.setItem('examEndTime', val);
      beginCountdown(candidate);
    });

    // ── Reset button ──────────────────────────────────────────────────────
    resetBtn.addEventListener('click', () => {
      clearInterval(tickInterval);
      tickInterval = null;
      shownMilestones = new Set();
      endTime = null;

      countdownScreen.classList.remove('visible');
      document.body.classList.remove('countdown-active');
      setupScreen.style.display = '';
      errorMsg.textContent = '';
    });

    // ── Begin countdown ───────────────────────────────────────────────────
    function beginCountdown(end) {
      endTime = end;
      shownMilestones = new Set();

      setupScreen.style.display = 'none';
      countdownScreen.classList.add('visible');
      document.body.classList.add('countdown-active');

      countdownNum.classList.remove('urgent', 'timesup');
      milestoneMsg.classList.remove('visible');

      tick();
      tickInterval = setInterval(tick, 500);
    }

    // ── Core tick ─────────────────────────────────────────────────────────
    function tick() {
      const secsRemaining = Math.round((endTime - Date.now()) / 1000);
      render(secsRemaining);
      checkMilestones(secsRemaining);
      updateClock();
    }

    // ── Render countdown display ──────────────────────────────────────────
    function render(secs) {
      if (secs <= 0) {
        countdownNum.textContent = "TIME'S UP";
        countdownNum.classList.add('timesup');
        countdownLabel.textContent = '';
        clearInterval(tickInterval);
        tickInterval = null;
        return;
      }

      countdownNum.classList.remove('timesup');

      if (secs <= 60) {
        // Show 0:SS
        const s = String(secs).padStart(2, '0');
        countdownNum.textContent = `0:${s}`;
        countdownLabel.textContent = 'seconds remaining';
        countdownNum.classList.add('urgent');
      } else {
        // Show whole minutes (rounded up)
        const mins = Math.ceil(secs / 60);
        countdownNum.textContent = String(mins);
        countdownLabel.textContent = mins === 1 ? 'minute remaining' : 'minutes remaining';
        countdownNum.classList.remove('urgent');
      }
    }

    // ── Check and fire milestone messages ────────────────────────────────
    function checkMilestones(secs) {
      for (const m of MILESTONES) {
        if (!shownMilestones.has(m.at) && secs <= m.at) {
          shownMilestones.add(m.at);
          showMessage(m.msg);
        }
      }
    }

    // ── Show a milestone message ──────────────────────────────────────────
    function showMessage(text) {
      clearTimeout(messageTimeout);
      milestoneMsg.textContent = text;
      milestoneMsg.classList.add('visible');
      messageTimeout = setTimeout(() => {
        milestoneMsg.classList.remove('visible');
      }, MESSAGE_DURATION_MS);
    }

    // ── Update current time display ───────────────────────────────────────
    function updateClock() {
      currentTimeEl.textContent = new Date().toLocaleTimeString([], {
        hour: 'numeric', minute: '2-digit', second: '2-digit'
      });
    }

    // ── Recover from tab sleep ────────────────────────────────────────────
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && endTime && tickInterval !== null) tick();
    });
  </script>
</body>
</html>
